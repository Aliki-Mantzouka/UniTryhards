<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Your University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KYXE2J5mJw2PqVqQ4dUn1DplS9wW8I8VqMl5FJYxg16b8db5eGgqYlSRX6XtPb51" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="university-page">
    <!-- Dropdown Menu -->
    <div class="dropdown-container">
      <button class="dropdown-btn" id="menu-toggle">Menu</button>
      <div class="dropdown-content" id="dropdown-menu">
        <a href="{% url 'home' %}" class="dropdown-item">Home</a>
        <a href="{% url 'profile' %}" class="dropdown-item">Profile</a>
        <a href="{% url 'university' %}" class="dropdown-item">University Selection</a>
        <a href="{% url 'login' %}" class="dropdown-item">Logout</a>
      </div>
    </div>
    <!-- Main University Selection Container -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card shadow p-3 mb-5" style="width: 50%;">
            <div class="card-body text-center">
                <h2>Pick Your University</h2>
                <form method="POST" action="{% url 'university' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="university">Choose University:</label>
                        <select name="university">
                            {% for university in universities %}
                                <option value="{{ university.id }}">{{ university.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Next</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const toggleBtn = document.getElementById('menu-toggle');
      const dropdown = document.getElementById('dropdown-menu');
    
      toggleBtn.addEventListener('click', function () {
        dropdown.classList.toggle('show');
      });
    
      // Hide menu if clicking outside
      window.addEventListener('click', function (e) {
        if (!toggleBtn.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.remove('show');
        }
      });
    </script>
</body>
</html>
