<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="papers-page">
    <!-- Dropdown Menu (Top Right) -->
    <div class="dropdown-container">
        <button class="dropdown-btn" id="menu-toggle">Menu</button>
        <div class="dropdown-content" id="dropdown-menu">
          <a href="{% url 'home' %}" class="dropdown-item">Home</a>
          <a href="{% url 'profile' %}" class="dropdown-item">Profile</a>
          <a href="{% url 'university' %}" class="dropdown-item">University Selection</a>
          <a href="{% url 'login' %}" class="dropdown-item">Logout</a>
        </div>
    </div>
    <div class="position-absolute top-0 end-0 p-3">
        <a href="{% url 'upload_paper' %}" class="btn btn-light border">Upload Paper</a>
    </div> 
    <div class="container mt-5">
        <h2 class="text-center">Available Papers for {{ course.name }}</h2>
        <div class="d-flex justify-content-end mb-3">
            <a href="{% url 'papers' department_id=department.id course_id=course.id %}"
               class="btn {% if current_category == 'all' %}btn-primary{% else %}btn-outline-primary{% endif %} me-2">
                All
            </a>
            <a href="{% url 'papers_by_category' department_id=department.id course_id=course.id category='notes' %}"
               class="btn {% if current_category == 'notes' %}btn-primary{% else %}btn-outline-primary{% endif %} me-2">
                Notes
            </a>
            <a href="{% url 'papers_by_category' department_id=department.id course_id=course.id category='exams' %}"
               class="btn {% if current_category == 'exams' %}btn-primary{% else %}btn-outline-primary{% endif %} me-2">
                Past Exam Questions
            </a>
            <a href="{% url 'papers_by_category' department_id=department.id course_id=course.id category='general' %}"
               class="btn {% if current_category == 'general' %}btn-primary{% else %}btn-outline-primary{% endif %}">
                General
            </a>
        </div>                
        <div class="paper-list mt-4">
            <form method="POST" action="{% url 'papers' department_id=department.id course_id=course.id %}">
                {% csrf_token %}
                <!-- Loop through all the papers for this course -->
                {% for paper in papers %}
                    <div class="paper-item">
                        <h5>{{ paper.title }}</h5>
                        <a href="{% url 'paper_detail' department_id=department.id course_id=course.id paper_id=paper.id %}" class="btn btn-primary">View Paper</a>
                    </div>
                {% empty %}
                    <p>No papers available for this course.</p>
                {% endfor %}
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('menu-toggle');
        const dropdown = document.getElementById('dropdown-menu');
      
        toggleBtn.addEventListener('click', function () {
          dropdown.classList.toggle('show');
        });
      
        // Optional: Hide menu if clicking outside
        window.addEventListener('click', function (e) {
          if (!toggleBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
          }
        });
      </script>     
</body>
</html>
