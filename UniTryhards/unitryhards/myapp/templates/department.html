<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Your Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body.selection-page {
            background: linear-gradient(to right, #e8f5e9, #c8e6c9);
            font-family: 'Segoe UI', sans-serif;
        }

        .selection-card {
            background-color: #ffffff;
            border: 2px solid #a5d6a7;
            border-radius: 15px;
            padding: 30px;
            width: 60%;
            box-shadow: 0 8px 16px rgba(76, 175, 80, 0.2);
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 25px;
        }

        .form-group label {
            font-weight: bold;
            color: #388e3c;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #81c784;
        }
    </style>
</head>
<body class="selection-page">
    <!-- Dropdown Menu -->
    <div class="dropdown-container">
      <button class="dropdown-btn" id="menu-toggle">Menu</button>
      <div class="dropdown-content" id="dropdown-menu">
        <a href="{% url 'home' %}" class="dropdown-item">Home</a>
        <a href="{% url 'profile' %}" class="dropdown-item">Profile</a>
        <a href="{% url 'university' %}" class="dropdown-item">University Selection</a>
        <a href="{% url 'login' %}" class="dropdown-item">Logout</a>
      </div>
    </div>
    <!-- Main Department Selection Container -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="selection-card">
            <h2 class="text-center">Pick Your Department from {{ university.name }}</h2>
            <form method="POST" action="{% url 'department' university_id=university.id %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="department">Choose Department:</label>
                    <select name="department" class="form-control" id="department">
                        {% for department in university.departments.all %}
                            <option value="{{ department.id }}">{{ department.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-success mt-4 w-100">Next</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('menu-toggle');
        const dropdown = document.getElementById('dropdown-menu');

        toggleBtn.addEventListener('click', function () {
            dropdown.classList.toggle('show');
        });

        window.addEventListener('click', function (e) {
            if (!toggleBtn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
