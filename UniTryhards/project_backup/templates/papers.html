<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="papers-page">
    <div class="container mt-5">
        <h2 class="text-center">Available Papers for {{ course.name }}</h2>
        <div class="paper-list mt-4">
            <form method="POST" action="{% url 'papers' department_id=department.id course_id=course.id %}">
                {% csrf_token %}
                <!-- Loop through all the papers for this course -->
                {% for paper in papers %}
                    <div class="paper-item">
                        <h5>{{ paper.title }}</h5>
                        <a href="{% url 'paper_detail' department_id=department.id course_id=course.id paper_id=paper.id %}" class="btn btn-primary">View Paper</a>
                    </div>
                {% empty %}
                    <p>No papers available for this course.</p>
                {% endfor %}
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
