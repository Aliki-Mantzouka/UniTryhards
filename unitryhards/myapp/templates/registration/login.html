<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJ2QXe6HIKmC56oV6Yf+WjVY5iC6t5uLJo6By7d7hZG14wKhfTbhP0w9XGfF" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="margin-top: -50px;">
            <h2>Login</h2>
            <form method="POST">
                {% csrf_token %}
                <label for="username">Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
                <label for="password">Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
