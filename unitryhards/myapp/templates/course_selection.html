<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="course-selection-page">
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card shadow p-3 mb-5" style="width: 50%;">
            <div class="card-body text-center">
                <h2>Select Your Course from {{ department.name }} Department at {{ university.name }}</h2>
                <form method="POST" action="{% url 'course_selection' university_id=university.id department_id=department.id %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="course">Choose Course:</label>
                        <select name="course" id="course" class="form-control">
                            {% for course in department.courses.all %}
                                <option value="{{ course.id }}">{{ course.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">View Papers</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
