<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KyZXEJ5mJwP2QvVd8n1UlNpLsoydvWAlmHGFxYiyl8db6d5ephGqylsRx6xtPb51" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background-color: #f7f7f7; padding-top: 50px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="profile-box p-4 border rounded shadow" style="background-color: #fff;">
                    <h2>Welcome to UniTryhards, {{ user.username }}!</h2>
                    <p>This is your profile page.</p>
                    <p>Here, you can view and edit your personal information, manage your uploaded resources, and more.</p>
                    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
