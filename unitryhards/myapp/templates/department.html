<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Your Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KYXE2J5mJw2PqVqQ4dUn1DplS9wW8I8VqMl5FJYxg16b8db5eGgqYlSRX6XtPb51" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Main Department Selection Container -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card shadow p-3 mb-5" style="width: 50%;">
            <div class="card-body text-center">
                <h2>Pick Your Department from {{ university }}</h2>
                <form method="POST" action="{% url 'papers' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="department">Choose Department:</label>
                        <select name="department" id="department" class="form-control mb-3">
                            <option value="department1">Department 1</option>
                            <option value="department2">Department 2</option>
                            <option value="department3">Department 3</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Next</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
